<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nile Gibson - Portfolio</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css?family=Montserrat:400,600,700" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

function App() {

  const [dark, setDark] = React.useState(false);
  const [filter, setFilter] = React.useState("all");

  React.useEffect(() => {
    const system = window.matchMedia("(prefers-color-scheme: dark)").matches;
    setDark(system);
  }, []);

  React.useEffect(() => {
    document.body.className = dark ? "dark" : "";
  }, [dark]);

  React.useEffect(() => {
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) e.target.classList.add("show");
      });
    });

    document.querySelectorAll(".reveal").forEach(el => observer.observe(el));
  }, []);

  const fullText = "Hi, I'm Nile Gibson — a student developer building creative projects.";
  const [typed, setTyped] = React.useState("");

  React.useEffect(() => {
    let i = 0;

    const interval = setInterval(() => {
      setTyped(fullText.slice(0, i));
      i++;

      if (i > fullText.length) {
        clearInterval(interval);
      }

    }, 40);

    return () => clearInterval(interval);

  }, []);

  const skills = [
    { name: "HTML", value: 100 },
    { name: "CSS", value: 75 },
    { name: "JavaScript", value: 25 }
  ];

  const [skillValues, setSkillValues] = React.useState([0,0,0]);

  React.useEffect(() => {

    const interval = setInterval(() => {

      setSkillValues(prev =>
        prev.map((v, i) =>
          v < skills[i].value ? v + 1 : v
        )
      );

    }, 15);

    return () => clearInterval(interval);

  }, []);

  const projects = [

    {
      title: "My YouTube Channel",
      grade: "3rd Grade",
      type: "video",
      link: "youtube-channel.html",
      description: "A channel where I created gaming and entertainment videos."
    },

    {
      title: "Movie Webpage",
      grade: "10th Grade",
      type: "coding",
      link: "movie-webpage.html",
      description: "A responsive movie website created with Bootstrap and CSS."
    },

    {
      title: "PRYSAFE Interview",
      grade: "10th Grade",
      type: "video",
      link: "prysafe-interview.html",
      description: "An interview project focused on communication and editing."
    },

    {
      title: "CYOA Project",
      grade: "10th Grade",
      type: "coding",
      link: "cyoa.html",
      description: "An interactive choose-your-own-adventure website."
    }

  ];

  const filtered = filter === "all"
    ? projects
    : projects.filter(p => p.type === filter);

  return (
    <>

      {/* NAVBAR */}
      <nav className="navbar navbar-expand-lg glass-navbar fixed-top">

        <div className="container">

          <a className="navbar-brand fw-bold">Nile Gibson's Portfolio</a>

          <button
            className="navbar-toggler"
            data-bs-toggle="collapse"
            data-bs-target="#nav"
          >
            ☰
          </button>

          <div className="collapse navbar-collapse" id="nav">

            <ul className="navbar-nav ms-auto gap-2 align-items-center">

              <li>
                <a className="nav-link fw-bold" href="#projects">
                  Projects
                </a>
              </li>

              <li>
                <a className="nav-link fw-bold" href="#skills">
                  Skills
                </a>
              </li>

              <li>
                <a className="nav-link fw-bold" href="#about">
                  About
                </a>
              </li>

              <li>
                  <button
  className={`btn btn-sm ${
    dark
      ? "btn-outline-light"
      : "btn-outline-dark"
  }`}
  onClick={() => setDark(!dark)}
>
  {dark ? "☀️ Light Mode" : "🌙 Dark Mode"}
</button>

              </li>

            </ul>

          </div>

        </div>

      </nav>

      {/* HERO */}
      <section className="hero reveal">

        <img src="img/Logo.png" id="logo" />

        <h1 className="mt-3">Welcome</h1>

        <p className="typing-text">
          {typed}<span className="cursor">|</span>
        </p>

      </section>

      {/* FILTERS */}
      <section className="text-center my-4 reveal">

        {["all","coding","video"].map(type => (

          <button
            key={type}
            className={`btn mx-1 ${
              filter === type
              ? "btn-primary"
              : "btn-outline-primary"
            }`}
            onClick={() => setFilter(type)}
          >

            {type.toUpperCase()}

          </button>

        ))}

      </section>

      {/* PROJECTS */}
      <section id="projects" className="container reveal">

        <h3 className="section-title text-center">
          Projects
        </h3>

        <div className="project-scroll">

          {filtered.map((p, i) => (

            <div className="project-card" key={i}>

              <h5>{p.title}</h5>

              <span className="badge bg-primary">
                {p.grade}
              </span>

              <p className="mt-2 text-capitalize">
                {p.type}
              </p>

              <p className="project-desc">
                {p.description}
              </p>

              <a href={p.link}>
                View →
              </a>

            </div>

          ))}

        </div>

      </section>

      {/* SKILLS */}
      <section id="skills" className="container py-5 reveal">

        <h3 className="section-title text-center">
          Skills
        </h3>

        {skills.map((s, i) => (

          <div className="skill" key={i}>

            <p>
              {s.name} — {skillValues[i]}%
            </p>

            <div className="progress">

              <div
                className="progress-bar"
                style={{width: skillValues[i] + "%"}}
              ></div>

            </div>

          </div>

        ))}

      </section>

      {/* ABOUT */}
      <section id="about" className="container py-5 reveal">

        <h3 className="section-title text-center">
          About Me
        </h3>

        <div className="accordion" id="aboutAccordion">

          <div className="accordion-item">

            <h2 className="accordion-header">

              <button
                className="accordion-button"
                data-bs-toggle="collapse"
                data-bs-target="#a1"
              >
                💻 Coding
              </button>

            </h2>

            <div
              id="a1"
              className="accordion-collapse collapse show"
            >

              <div className="accordion-body">
                I enjoy building websites and learning programming.
              </div>

            </div>

          </div>

          <div className="accordion-item">

            <h2 className="accordion-header">

              <button
                className="accordion-button collapsed"
                data-bs-toggle="collapse"
                data-bs-target="#a2"
              >
                🎥 Content Creation
              </button>

            </h2>

            <div
              id="a2"
              className="accordion-collapse collapse"
            >

              <div className="accordion-body">
                I like making videos and expressing creativity online.
              </div>

            </div>

          </div>

          <div className="accordion-item">

            <h2 className="accordion-header">

              <button
                className="accordion-button collapsed"
                data-bs-toggle="collapse"
                data-bs-target="#a3"
              >
                📱 Tech
              </button>

            </h2>

            <div
              id="a3"
              className="accordion-collapse collapse"
            >

              <div className="accordion-body">
                I explore apps, tools, and digital trends.
              </div>

            </div>

          </div>

        </div>

      </section>
{/* RESUME */}
<section className="container py-5 reveal">

  <div className="resume-box text-center">

    <h3 className="section-title">
      Resume
    </h3>

    <p className="resume-text">
      View my resume to learn more about my experience,
      projects, and technical skills.
    </p>

    <a
      className="btn btn-primary resume-btn"
      href="resume.pdf"
      target="_blank"
    >
      📄 View Resume
    </a>

  </div>

</section>
{/* FOOTER */}
<footer className="footer reveal">

  <div className="footer-inner text-center">

    <a
      href="https://github.com/nileg3073"
      target="_blank"
    >
      <img
        src="img/fork.png"
        className="footer-fork"
      />
    </a>

    <div className="mt-3">

      <a
        href="https://hstatsep.github.io"
        target="_blank"
      >
        <img
          src="https://hstatsep.github.io/img/hstatsep-logo-small.png"
          className="footer-hstat"
        />
      </a>

    </div>

    <p className="mt-3 mb-0">
      © 2026 Nile Gibson — 10th Grade
    </p>

  </div>

</footer>
    </>
  );
}

ReactDOM
  .createRoot(document.getElementById("root"))
  .render(<App />);

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
